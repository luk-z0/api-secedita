services:
  laravel.test:
    build:
      context: .
      dockerfile: ./docker/Dockerfile
      args:
        WWWGROUP: '${WWWGROUP}'
    image: sail-8.5/app
    expose:
      - "9000"
    environment:
      - .env
    networks:
      - sail
    depends_on:
      - redis

  nginx:
    image: nginx:alpine
    ports:
      - '${APP_PORT:-80}:80'
    volumes:
      - './docker/nginx/default.conf:/etc/nginx/conf.d/default.conf'
    depends_on:
      - laravel.test
    networks:
      - sail

  mailpit:
    image: 'axllent/mailpit:latest'
    ports:
      - '${FORWARD_MAILPIT_PORT:-1025}:1025'
      - '${FORWARD_MAILPIT_DASHBOARD_PORT:-8025}:8025'
    networks:
      - sail

  redis:
    image: 'redis:alpine'
    ports:
      - '${FORWARD_REDIS_PORT:-6379}:6379'
    volumes:
      - 'sail-redis:/data'
    networks:
      - sail
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      retries: 3
      timeout: 5s

networks:
  sail:
    driver: bridge

volumes:
  sail-redis:
    driver: local
