services:
  laravel:
    build:
      context: .
      dockerfile: ./docker/Dockerfile
      target: dev
      args:
        WWWGROUP: '${WWWGROUP}'
    image: sail-8.5/app
    container_name: laravel-dev
    volumes:
      - .:/var/www/html
    expose:
      - "9000"
    env_file:
      - .env
    networks:
      - sail
    depends_on:
      - redis

  nginx:
    image: nginx:alpine
    container_name: nginx-dev
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - laravel
    networks:
      - sail

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - sail

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - sail-redis:/data
    networks:
      - sail
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      retries: 3
      timeout: 5s

networks:
  sail:
    driver: bridge

volumes:
  sail-redis:
    driver: local
