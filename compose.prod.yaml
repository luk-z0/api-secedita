version: "3.9"

services:
  laravel:
    build:
      context: .
      dockerfile: ./docker/Dockerfile
      target: prod
      args:
        WWWGROUP: '${WWWGROUP}'
    container_name: laravel-prod
    restart: unless-stopped
    expose:
      - "9000"
    env_file:
      - .env
    networks:
      - sail
    depends_on:
      - redis

  nginx:
    image: nginx:alpine
    container_name: nginx-prod
    restart: unless-stopped
    ports:
      - '${APP_PORT:-8080}:80'
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - laravel
    networks:
      - sail

  redis:
    image: redis:alpine
    container_name: redis-prod
    restart: unless-stopped
    volumes:
      - sail-redis:/data
    networks:
      - sail

networks:
  sail:
    driver: bridge

volumes:
  sail-redis:
    driver: local
