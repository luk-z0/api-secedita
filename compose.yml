services:
  laravel:
    build:
      context: .
      dockerfile: ./docker/Dockerfile
      target: dev
      args:
        WWWGROUP: '${WWWGROUP}'
    container_name: laravel
    volumes:
      - .:/var/www/html
    env_file:
      - .env
    networks:
      - portal-secedita
    depends_on:
      - redis
    dns:
      - 8.8.8.8
      - 1.1.1.1

  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - laravel
    networks:
      - portal-secedita

  mailpit:
    image: axllent/mailpit:latest
    container_name: mailpit
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - portal-secedita

  redis:
    image: redis:alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - portal-secedita-redis:/data
    networks:
      - portal-secedita
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      retries: 3
      timeout: 5s

networks:
  portal-secedita:
    driver: bridge

volumes:
  portal-secedita-redis:
    driver: local
